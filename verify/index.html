<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <link rel="icon" href="/favicon.png" type="image/png"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <meta name="description" content="Verify your Discord account to access the DevLink server."/>
  <meta property="og:title" content="Verify - DevLink"/>
  <meta property="og:description" content="Verify your Discord account to access the DevLink server."/>
  <meta property="og:image" content="https://devlinkco.online/DevLinkRBBX.png"/>
  <meta property="og:url" content="https://devlinkco.online/verify"/>
  <meta property="og:type" content="website"/>
  <title>Verify - DevLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css"/>
  <script data-cfasync="false">try{var t=localStorage.getItem('devlink-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <img src="/DevLinkRBBX.png" alt="DevLink" onerror="this.style.display='none'"/>
    <span>DevLink</span>
  </a>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
      <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      <span id="themeLabel">Light</span>
    </button>
    <a href="/" class="nav-back">Back to home</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <span class="page-tag" id="statusTag">Verifying</span>
    <h1 id="statusTitle">Hang tight...</h1>
    <p id="statusDesc">We're verifying your Discord account. This should only take a moment.</p>
  </div>
</div>

<script src="/main.js"></script>
<script>
(async function () {
  var EDGE_URL = 'https://qgqpwxitbdjoggiwtjra.supabase.co/functions/v1/discord-verify';

  var tagEl   = document.getElementById('statusTag');
  var titleEl = document.getElementById('statusTitle');
  var descEl  = document.getElementById('statusDesc');

  function showSuccess() {
    tagEl.textContent   = 'Verified';
    titleEl.textContent = "You're in.";
    descEl.textContent  = 'Your account has been verified. Head back to Discord — you should now have full access to the server.';
  }

  function showError(msg) {
    tagEl.textContent   = 'Error';
    titleEl.textContent = 'Something went wrong.';
    descEl.textContent  = msg || 'Verification failed. Please return to #verify in the Discord server and try again.';
  }

  var params = new URLSearchParams(window.location.search);
  var code   = params.get('code');

  if (!code) {
    showError('No verification code found. Please return to Discord and click Verify again.');
    return;
  }

  try {
    var res  = await fetch(EDGE_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ code: code }),
    });
    var data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Verification failed. Please try again.');
      return;
    }

    showSuccess();
  } catch (err) {
    showError('Could not connect to the verification service. Please try again.');
  }
})();
</script>
</body>
</html>
